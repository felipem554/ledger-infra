name: Deploy to Staging

# Deploys a ledger-service image tag to staging. Two entry points:
#
#   - repository_dispatch `image-published`: sent by the ledger-service repo
#     after it pushes a new image to GHCR, with the tag in the payload. The app
#     repo only needs a narrow, trigger-only token — it never gains cluster
#     access (see ledger-service docs/ci-architecture.md).
#   - workflow_dispatch: manual deploy/rollback of any published tag.

on:
  repository_dispatch:
    types: [image-published]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'ledger-service image tag to deploy (sha or version)'
        required: true

permissions:
  contents: read

env:
  IMAGE: ghcr.io/felipem554/ledger-service

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Resolve image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            TAG="${{ github.event.client_payload.image_tag }}"
          else
            TAG="${{ github.event.inputs.image_tag }}"
          fi
          if [ -z "$TAG" ]; then
            echo "No image tag provided" >&2
            exit 1
          fi
          echo "TAG=$TAG" >> $GITHUB_OUTPUT
      - name: Set up Helm
        uses: azure/setup-helm@v4
      - name: Configure kubectl
        uses: azure/k8s-set-context@v4
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG_STAGING }}
      - name: Deploy with Helm
        run: |
          helm upgrade --install ledger helm/ledger \
            --namespace ledger-staging \
            --create-namespace \
            -f helm/ledger/values.yaml \
            -f helm/ledger/values-staging.yaml \
            --set image.repository=${{ env.IMAGE }} \
            --set image.tag=${{ steps.tag.outputs.TAG }} \
            --set secretEnv.POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD_STAGING }} \
            --atomic \
            --timeout 10m \
            --wait

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: deploy-staging
    steps:
      - uses: actions/checkout@v4
      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D68
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update && sudo apt-get install k6
      - name: Run smoke test against staging
        run: |
          BASE_URL=${{ secrets.STAGING_URL }} k6 run k6/smoke.js
