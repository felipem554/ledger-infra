name: PR Checks
on:
  pull_request:
    branches: [main]
jobs:
  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - run: helm lint helm/ledger

  python-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Syntax check
        run: python -m py_compile scripts/capacity_calc.py
      - name: Smoke run
        run: python scripts/capacity_calc.py --tps 100
