name: Release to Production

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: read

env:
  REGISTRY: ghcr.io
  # The image is published by the ledger-service (app) repo, not this one.
  IMAGE_NAME: felipem554/ledger-service

jobs:
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Set up Helm
        uses: azure/setup-helm@v4
      - name: Configure kubectl
        uses: azure/k8s-set-context@v4
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG_PROD }}
      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      - name: Deploy with Helm
        run: |
          helm upgrade --install ledger-api helm/ledger \
            --namespace ledger-prod \
            --create-namespace \
            --set image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} \
            --set image.tag=${{ steps.version.outputs.VERSION }} \
            --set replicaCount=3 \
            --set hpa.minReplicas=3 \
            --atomic \
            --timeout 10m \
            --wait

  post-deploy-verify:
    name: Post-Deploy Verification
    runs-on: ubuntu-latest
    needs: deploy-production
    steps:
      - uses: actions/checkout@v4
      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D68
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update && sudo apt-get install k6
      - name: Run smoke test against production
        run: |
          BASE_URL=${{ secrets.PROD_URL }} k6 run k6/smoke.js
      - name: Verify health endpoint
        run: |
          curl -sf ${{ secrets.PROD_URL }}/healthz || exit 1
          curl -sf ${{ secrets.PROD_URL }}/readyz || exit 1
