{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "ledger.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "ledger.name" . }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ include "ledger.name" . }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        # Same-namespace traffic (e.g. in-cluster clients, port-forward debug).
        - podSelector: {}
        {{- range .Values.networkPolicy.allowedNamespaceSelectors }}
        - namespaceSelector:
            matchLabels:
              {{- toYaml . | nindent 14 }}
        {{- end }}
      ports:
        - protocol: TCP
          port: {{ .Values.service.targetPort }}
{{- end -}}
