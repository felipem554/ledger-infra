replicaCount: 3

hpa:
  enabled: true
  minReplicas: 3
  maxReplicas: 30
  targetCPUUtilizationPercentage: 70

pdb:
  enabled: true
  minAvailable: 2

networkPolicy:
  enabled: true

env:
  LOG_LEVEL: INFO

# secretEnv.POSTGRES_PASSWORD must be supplied at deploy time via --set or a
# sealed-secrets/external-secrets operator. Never commit real credentials here.
