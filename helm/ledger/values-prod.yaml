replicaCount: 3

hpa:
  enabled: true
  minReplicas: 3
  maxReplicas: 30
  targetCPUUtilizationPercentage: 70

pdb:
  enabled: true
  minAvailable: 2

# Locks API ingress down to the namespaces listed in
# networkPolicy.allowedNamespaceSelectors (see values.yaml).
networkPolicy:
  enabled: true

env:
  LOG_LEVEL: INFO
  # Kafka command ingestion stays off in prod until the command topics are
  # provisioned (32 partitions; see ledger-service docs/kafka-command-ingestion.md).
  # Rollback is COMMAND_INGEST_ENABLED=false.

# secretEnv.POSTGRES_PASSWORD must be supplied at deploy time via --set or a
# sealed-secrets/external-secrets operator. Never commit real credentials here.
