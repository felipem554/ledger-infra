image:
  repository: ledger-api
  tag: "latest"
  pullPolicy: IfNotPresent

replicaCount: 3

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "256k"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "10"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "10"
  hosts:
    - host: ledger.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: "250m"
    memory: "512Mi"
  limits:
    cpu: "2"
    memory: "2Gi"

probes:
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 5
  liveness:
    initialDelaySeconds: 10
    periodSeconds: 10

env:
  LOG_LEVEL: INFO
  OTEL_EXPORTER_OTLP_ENDPOINT: ""
  KAFKA_BOOTSTRAP: "kafka:9092"
  POSTGRES_URL: "jdbc:postgresql://postgres:5432/ledger"
  POSTGRES_USER: "ledger"
  MONGO_URI: "mongodb://mongo:27017/ledger"

# Sensitive values — stored in a Kubernetes Secret and injected via envFrom.
# Set POSTGRES_PASSWORD at deploy time: --set secretEnv.POSTGRES_PASSWORD=<value>
# Never commit real credentials here.
secretEnv:
  POSTGRES_PASSWORD: ""

hpa:
  enabled: true
  minReplicas: 3
  maxReplicas: 30
  targetCPUUtilizationPercentage: 70

pdb:
  enabled: true
  minAvailable: 2

networkPolicy:
  enabled: false


