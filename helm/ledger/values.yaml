image:
  repository: ledger-api
  tag: "latest"
  pullPolicy: IfNotPresent

replicaCount: 3

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: true
  className: nginx
  hosts:
    - host: ledger.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: "250m"
    memory: "512Mi"
  limits:
    cpu: "2"
    memory: "2Gi"

env:
  LOG_LEVEL: INFO
  OTEL_EXPORTER_OTLP_ENDPOINT: ""
  KAFKA_BOOTSTRAP: "kafka:9092"
  POSTGRES_URL: "jdbc:postgresql://postgres:5432/ledger"
  POSTGRES_USER: "ledger"
  POSTGRES_PASSWORD: "ledger"
  MONGO_URI: "mongodb://mongo:27017/ledger"

hpa:
  enabled: true
  minReplicas: 3
  maxReplicas: 30
  targetCPUUtilizationPercentage: 70

pdb:
  enabled: true
  minAvailable: 2

networkPolicy:
  enabled: false
